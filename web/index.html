<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Hand tracking — MediaPipe + Three.js</title>
  <style>
    :root { color-scheme: dark; }
    html, body { margin: 0; height: 100%; overflow: hidden; background: #101114; font-family: system-ui, sans-serif; }
    #status {
      position: fixed; top: 12px; left: 50%; transform: translateX(-50%);
      color: #ddd; background: rgba(0,0,0,0.55); padding: 8px 14px; border-radius: 8px;
      font-size: 14px; z-index: 10; pointer-events: none; max-width: 80vw; text-align: center;
    }
    #cam { display: none; }
  </style>
</head>
<body>
  <div id="status">Click anywhere and allow camera access…</div>
  <video id="cam" playsinline muted></video>

  <script type="importmap">
  {
    "imports": {
      "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
      "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/",
      "lil-gui": "https://cdn.jsdelivr.net/npm/lil-gui@0.19.2/dist/lil-gui.esm.js",
      "@mediapipe/tasks-vision": "https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.18/vision_bundle.mjs"
    }
  }
  </script>
  <script type="module" src="./main.js"></script>
</body>
</html>
